# XcodeGen 선언 파일 — `xcodegen generate` 로 InitialConsonantFinder.xcodeproj 재생성.
# .xcodeproj 자체는 git 에 올리지 않고 이 파일을 진실의 원천으로 삼는다.
name: InitialConsonantFinder

options:
  bundleIdPrefix: com.kilga
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  # 레포 루트의 Swift Package (KoreanInitialMatcher + ContactFinder 두 라이브러리)
  LocalPackage:
    path: .

targets:
  InitialConsonantFinder:
    type: application
    platform: iOS
    sources:
      - path: InitialConsonantFinder
    dependencies:
      - package: LocalPackage
        product: KoreanInitialMatcher
      - package: LocalPackage
        product: ContactFinder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kilga.InitialConsonantFinder
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1" # iPhone 전용 (아이패드는 백로그)
        CODE_SIGN_STYLE: Automatic
        # Info.plist 를 별도 파일 없이 빌드 설정에서 생성한다.
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        # 이 키가 없으면 연락처 접근 시 iOS 가 앱을 크래시시킨다. 절대 누락 금지.
        INFOPLIST_KEY_NSContactsUsageDescription: "연락처에서 이름을 초성으로 빠르게 찾기 위해 접근이 필요합니다."

  # 개발용 시딩 도구. 앱을 호스트로 삼아 앱 번들 ID 의 연락처 권한을 물려받는다.
  # 앱 바이너리에는 포함되지 않는다. 실기기에서 돌리지 말 것 (연락처 전체 삭제).
  SeedContacts:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DevTools/SeedContacts
    dependencies:
      - target: InitialConsonantFinder
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.kilga.InitialConsonantFinder.SeedContacts
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/InitialConsonantFinder.app/InitialConsonantFinder"
        BUNDLE_LOADER: "$(TEST_HOST)"

  # 4단계(시뮬레이터 검증) 자동화. SeedContacts 로 시딩한 뒤 실행한다.
  UITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DevTools/UITests
    dependencies:
      - target: InitialConsonantFinder
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.kilga.InitialConsonantFinder.UITests
        TEST_TARGET_NAME: InitialConsonantFinder
